<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Volleyball Cast Receiver</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script type="module" crossorigin src="./assets/index-CkkmfhGc.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-ClDwoahV.css">
  </head>
  <body class="theme-coach">
    <video id="video" autoplay></video>

    <div id="overlay">
      <div id="overlay-top">
        <div id="set-indicator"></div>
        <div id="set-history"></div>
      </div>

      <div id="overlay-score">
        <div class="score-side score-side-us">
          <div class="score-home"></div>
          <div class="serve-dot serve-us">▲ SERVE</div>
        </div>
        <div class="score-sep">:</div>
        <div class="score-side score-side-opp">
          <div class="score-away"></div>
          <div class="serve-dot serve-opp">▲ SERVE</div>
        </div>
      </div>

      <div id="overlay-teams">
        <div class="team-us-name"></div>
        <div class="team-opp-name"></div>
      </div>

      <div id="overlay-counters"></div>

      <div id="overlay-bottom">
        <div id="last-action"></div>
        <div id="set-badge"></div>
      </div>

      <div id="stale-indicator"></div>
      <div id="event-popup-container"></div>
    </div>

  </body>
</html>
